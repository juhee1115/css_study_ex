<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    h1{
    color: #0000ff; /*16진수 표기법*/
    text-align: center;
    /* text-shadow: 가로거리 세로거리 번짐의 정도 색상; */
    text-shadow:3px 3px 3px rgb(41, 173, 235);
    /*줄간격 조절*/
    letter-spacing: -3px;
    }

    h2{
        color: pink;
text-shadow: 7px -7px 0.3px #f9e7ff ;

    }
    p{
color: rgb(0, 255, 21); /*색상 이름 표기법*/
text-align: center;
line-height: 200%;

    }
    span{
    color: rgb(255, 0, 0);/*rgb표기법*/
    font-weight: bold;
    }
.hanra{
color: coral;
}
.orange{
    color: chocolate;
    font-weight: 900;
}
.second{
    color: blue;
  
}
.third{
color: rgb(255, 238, 0);
}
em{
font-size: 14px;
color: black;
}
.box{
    width: 200px;
    height: 200px;
    background-color: aqua;
    text-align: center;
    line-height: 200px;
}
.box2{
width: 200px;
height: 200px;
background-color: bisque;
text-align: center;
line-height: 200px;
}
.box3{
width: 200px;
height: 200px;
background-color: rgb(20, 20, 20);
text-align: center;
line-height: 200px;
color: aliceblue;
text-decoration: underline;
text-decoration: dashed;
}
a{
    text-decoration: none;
}
    </style>
</head>
<body>
    <h1>레드향</h1>
    <h2>박주희</h2>
    <p>껍질에 붉은 빛이 돌아 <span>레드향</span>이라 불린다</p>
    <p class="second">레드향은 <span class="hanra">한라봉</span>과 <span class="orange">귤</span>을 교배한 것으로</p>
    <p class="third">일반 귤보다 2~3배 크고, 과육이 <em>붉고 통통&nbsp;&nbsp;&nbsp;</em>하다</p>
    <!-- 박수 안에 글자 중간 정렬 -->
     <div class="box">박스 - 1</div>
     <div class="box2">박스 - 2</div>
     <div class="box3">박스 - 3</div>
<a href="https://www.google.com/">구글로 이동</a>

</body>
</html>
